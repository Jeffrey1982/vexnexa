<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 310" width="1020" height="310">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- ===== RADAR ICON (stroke-based outlines) ===== -->
  <g transform="translate(140,140)" fill="none" stroke="#FF6B35" stroke-width="7">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="130"/>
    <!-- Middle circle -->
    <circle cx="0" cy="0" r="88"/>
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="46"/>
    <!-- Vertical crosshair -->
    <line x1="0" y1="-130" x2="0" y2="130"/>
    <!-- Horizontal crosshair -->
    <line x1="-130" y1="0" x2="130" y2="0"/>
  </g>
  <!-- Filled radar sweep wedge (upper-right, ~45 deg) -->
  <path d="M 140,140 L 232,48 A 130,130 0 0,1 270,140 Z" fill="#FF6B35" opacity="0.85"/>

  <!-- ===== ORANGE ROUNDED RECTANGLE with white text ===== -->
  <rect x="295" y="28" width="700" height="224" rx="24" ry="24" fill="#FF6B35"/>
  <!-- "Vexnexa" text -->
  <text x="645" y="175" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="500" font-size="140" fill="white" letter-spacing="-2">Vexnexa</text>

  <!-- ===== TAGLINE ===== -->
  <text x="645" y="290" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="400" font-size="22" fill="#FF6B35" letter-spacing="6">DEVELOPER-FRIENDLY WCAG SCANNING</text>
</svg>
